augmentation:
  copy_paste: 0.0
  degrees: 5.0
  erasing: 0.15
  fliplr: 0.5
  flipud: 0.0
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  mixup: 0.0
  mosaic: 0.0
  perspective: 0.0
  scale: 0.1
  shear: 2.0
  translate: 0.05
dataset:
  prepared_root: data/cholect50_phase1
  yolo_dataset_yaml: data/cholect50_phase1/dataset.yaml
experiment:
  name: yolo_seg_cholect50_small
  output_root: outputs/train
model:
  batch_size: 4
  checkpoint: yolo11n-seg.pt
  device: auto
  epochs: 50
  image_size: 640
  patience: 20
  project: outputs/train
  run_name: yolo_seg_cholect50_small
  save_period: 5
  workers: 2
